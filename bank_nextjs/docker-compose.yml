version: '3.8'

services:
  # 1. Твой основной сайт (Next.js)
  bank_app:
    image: ghcr.io/ilya-ivanov23/idpbankapp23:latest
    container_name: bank_nextjs
    expose:
      - "3000"
    env_file:
      - .env
    restart: always
    depends_on:
      - kafka
    networks:
      - bank_network

  # 2. Caddy - прокси и HTTPS
  caddy:
    image: caddy:latest
    container_name: caddy_proxy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - bank_app
    networks:
      - bank_network

  # 3. Kafka (Брокер сообщений)
  kafka:
    image: confluentinc/cp-kafka:latest
    container_name: bank_kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://34.74.252.2:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_HEAP_OPTS: "-Xmx256M -Xms256M"
    volumes:
      - kafka_data:/var/lib/kafka/data
    restart: always
    networks:
      - bank_network

  # 4. Loki - Хранилище логов
  loki:
    image: grafana/loki:latest
    container_name: bank_loki
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    restart: always
    networks:
      - bank_network

  # 5. Promtail - Агент сбора логов
  promtail:
    image: grafana/promtail:latest
    container_name: bank_promtail
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - ./monitoring/promtail-config.yaml:/etc/promtail/config.yml:ro
    command: -config.file=/etc/promtail/config.yml -config.expand-env=true
    restart: always
    networks:
      - bank_network

  # 6. Node Exporter - Метрики системы
  node-exporter:
    image: prom/node-exporter:latest
    container_name: bank_node_exporter
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
      - '--collector.netdev.device-exclude=^(veth|br-|docker|lo).*'
    restart: always
    networks:
      - bank_network

  # 7. Grafana Alloy - Метрики в Grafana Cloud
  alloy:
    image: grafana/alloy:latest
    container_name: bank_alloy
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./monitoring/alloy-config.alloy:/etc/alloy/config.alloy:ro
    command: run /etc/alloy/config.alloy
    environment:
      - PROMETHEUS_URL=${PROMETHEUS_URL}
      - PROMETHEUS_USER=${PROMETHEUS_USER}
      - PROMETHEUS_PASSWORD=${PROMETHEUS_PASSWORD}
    restart: always
    networks:
      - bank_network

  notification_service:
    image: node:18-alpine
    container_name: notification_service
    working_dir: /app
    volumes:
      - ./workers/notification-service:/app
      - /etc/localtime:/etc/localtime:ro
    command: sh -c "npm install && npm start"
    env_file:
      - .env
    depends_on:
      - kafka
    networks:
      - bank_network

volumes:
  caddy_data:
  caddy_config:
  kafka_data:

networks:
  bank_network:
    driver: bridge
