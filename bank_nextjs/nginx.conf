events {
    worker_connections 1024;
}

http {
    # Enable Gzip compression for static files to optimize traffic
    gzip on;
    gzip_disable "msie6";
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6; # Optimal compression level (speed/size ratio)
    gzip_buffers 16 8k;
    gzip_http_version 1.1;
    # File types that NGINX should compress on the fly
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    server {
        listen 80;
        server_name localhost;

        # Route 1: MinIO Storage (S3)
        # All requests starting with /storage/ go to the minio Docker container
        location /storage/ {
            proxy_pass http://minio:9000/;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Allow uploading large scans/PDFs (up to 50 MB)
            client_max_body_size 50M; 
        }


        # Route 2: Next.js Frontend
        # All other requests are forwarded to the local Next.js server (your Mac)
        location / {
            proxy_pass http://host.docker.internal:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            
            # Important for Next.js (WebSocket support for Hot Reload / Fast Refresh)
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}
