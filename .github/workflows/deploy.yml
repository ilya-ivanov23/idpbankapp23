name: CI/CD Pipeline

on:
  workflow_dispatch:
  push:
    branches: [ "main", "dev", "develop" ]
  pull_request:
    branches: [ "main", "dev", "develop" ]

jobs:
  test-and-lint:
    name: 🏗️ Test & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci
      - run: npm run lint
      - run: npm run test
      
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps
        
      - name: Run Playwright E2E tests
        run: npx playwright test

  build-and-push:
    name: 🐳 Build & Push to GHCR
    needs: test-and-lint
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry (GHCR)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/ilya-ivanov23/idpbankapp23:latest
          build-args: |
            NEXT_PUBLIC_SITE_URL=${{ secrets.NEXT_PUBLIC_SITE_URL }}
            NEXT_PUBLIC_APPWRITE_ENDPOINT=${{ secrets.NEXT_PUBLIC_APPWRITE_ENDPOINT }}
            NEXT_PUBLIC_APPWRITE_PROJECT_ID=${{ secrets.NEXT_PUBLIC_APPWRITE_PROJECT_ID }}
            NEXT_APPWRITE_KEY=${{ secrets.NEXT_APPWRITE_KEY }}
            APPWRITE_DATABASE_ID=${{ secrets.APPWRITE_DATABASE_ID }}
            APPWRITE_USER_COLLECTION_ID=${{ secrets.APPWRITE_USER_COLLECTION_ID }}
            APPWRITE_BANK_COLLECTION_ID=${{ secrets.APPWRITE_BANK_COLLECTION_ID }}
            APPWRITE_TRANSACTION_COLLECTION_ID=${{ secrets.APPWRITE_TRANSACTION_COLLECTION_ID }}
            PLAID_CLIENT_ID=${{ secrets.PLAID_CLIENT_ID }}
            PLAID_SECRET=${{ secrets.PLAID_SECRET }}
            PLAID_ENV=sandbox
            PLAID_PRODUCTS=${{ secrets.PLAID_PRODUCTS }}
            PLAID_COUNTRY_CODES=${{ secrets.PLAID_COUNTRY_CODES }}
            DWOLLA_KEY=${{ secrets.DWOLLA_KEY }}
            DWOLLA_SECRET=${{ secrets.DWOLLA_SECRET }}
            DWOLLA_ENV=sandbox
            DWOLLA_BASE_URL=${{ secrets.DWOLLA_WEBHOOK_URL }}

  deploy-to-server:
    name: 🚀 Deploy to GCP Server
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GCP Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.GCP_HOST }}
          username: ${{ secrets.GCP_USERNAME }}
          key: ${{ secrets.GCP_SSH_KEY }}
          script: |
            cd ~/idpbankapp23
            docker compose pull
            docker compose up -d --force-recreate
            docker image prune -f
