# ===============================
# DOCKER PROFILE (application-docker.properties)
# Безопасно для git: секреты читаются из переменных окружения Docker
# Активируется через: SPRING_PROFILES_ACTIVE=docker
# ===============================

# БАЗА ДАННЫХ — значения приходят из docker-compose environment
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# KAFKA — брокер внутри docker-сети
spring.kafka.bootstrap-servers=${KAFKA_BROKERS:bank-kafka:29092}
spring.kafka.consumer.group-id=bank-core-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.consumer.properties.spring.json.trusted.packages=*
spring.kafka.consumer.properties.spring.json.value.default.type=com.idpbank.core_engine.dto.TransactionEvent

# FLYWAY
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

# ЛОГИРОВАНИЕ для дебага (можно убрать в продакшене)
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.web.servlet.mvc.method.annotation.RequestMappingHandlerMapping=TRACE
