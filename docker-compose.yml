version: '3.8'

services:
  # 1. Bank storage (S3) for PDF receipts and personal data
  minio:
    image: minio/minio:latest
    container_name: bank_s3_storage
    ports:
      - "9000:9000" # API port (for backend code)
      - "9001:9001" # Web UI port (for managing buckets in the browser)
    environment:
      MINIO_ROOT_USER: "bank_admin"
      MINIO_ROOT_PASSWORD: "bank_secure_password_123"
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - bank_network

  # 3. Kafka - event broker for Event-Driven Architecture (SCRUM-67, SCRUM-68)
  # KRaft mode: modern Kafka 3.x+ without Zookeeper
  kafka:
    image: confluentinc/cp-kafka:latest
    container_name: bank_kafka
    ports:
      - "9092:9092"
    environment:
      # KRaft mode - this node is both broker and controller
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      # SCRUM-68: Dual-listener setup
      # PLAINTEXT      - for internal Docker container communication (kafka:29092)
      # PLAINTEXT_HOST - for Next.js running locally on Mac (localhost:9092)
      # CONTROLLER     - for KRaft internal quorum communication
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      # Unique cluster ID (base64 encoded UUID, required for KRaft)
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    volumes:
      - kafka_data:/var/lib/kafka/data
    restart: always
    networks:
      - bank_network

  # 2. Reverse Proxy (NGINX) - load balancer and static files optimizer (Gzip)
  nginx:
    image: nginx:alpine
    container_name: bank_api_gateway
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      minio:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"  # Allows NGINX to "see" Next.js on your Mac
    restart: always
    networks:
      - bank_network

  # 5. Promtail - ships container logs → Grafana Cloud Loki (SCRUM-91)
  promtail:
    image: grafana/promtail:latest
    container_name: bank_promtail
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./monitoring/promtail-config.yaml:/etc/promtail/config.yml:ro
    command: -config.file=/etc/promtail/config.yml -config.expand-env=true
    environment:
      - LOKI_URL=${LOKI_URL}
      - LOKI_USER=${LOKI_USER}
      - LOKI_PASSWORD=${LOKI_PASSWORD}
    restart: always
    networks:
      - bank_network

  # 6. Node Exporter - exposes host metrics (CPU, RAM, Disk) for Prometheus (SCRUM-92)
  node-exporter:
    image: prom/node-exporter:latest
    container_name: bank_node_exporter
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
      - '--collector.netdev.device-exclude=^(veth|br-|docker|lo).*'
    restart: always
    networks:
      - bank_network

  # 7. Grafana Alloy - scrapes metrics and ships them → Grafana Cloud (SCRUM-90)
  alloy:
    image: grafana/alloy:latest
    container_name: bank_alloy
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./monitoring/alloy-config.alloy:/etc/alloy/config.alloy:ro
    command: run /etc/alloy/config.alloy
    environment:
      - PROMETHEUS_URL=${PROMETHEUS_URL}
      - PROMETHEUS_USER=${PROMETHEUS_USER}
      - PROMETHEUS_PASSWORD=${PROMETHEUS_PASSWORD}
    restart: always
    networks:
      - bank_network

volumes:
  minio_data:
  kafka_data:

networks:
  bank_network:
    driver: bridge
