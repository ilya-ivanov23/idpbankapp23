version: '3.8'

services:
  # 1. Bank storage (S3) for PDF receipts and personal data
  minio:
    image: minio/minio:latest
    container_name: bank_s3_storage
    ports:
      - "9000:9000" # API port (for backend code)
      - "9001:9001" # Web UI port (for managing buckets in the browser)
    environment:
      MINIO_ROOT_USER: "bank_admin"
      MINIO_ROOT_PASSWORD: "bank_secure_password_123"
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - bank_network

  # 2. Reverse Proxy (NGINX) - load balancer and static files optimizer (Gzip)
  nginx:
    image: nginx:alpine
    container_name: bank_api_gateway
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      minio:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"  # Allows NGINX to "see" Next.js on your Mac
    restart: always
    networks:
      - bank_network

volumes:
  minio_data:

networks:
  bank_network:
    driver: bridge
